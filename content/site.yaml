    ║{gray}──────────────────────────────────────────────────────────────────────────────{/}║
    ║  {yellow}Founder{/} {gray}·{/} {lightgreen}Builder{/} {gray}·{/} {lightcyan}Data Infrastructure{/} {gray}·{/} {lightmagenta}BBS Nostalgist{/}                    ║
