# BBS.css Site Configuration
# This file defines your BBS identity, pages, and structure.

site:
  name: "Mustafa's BBS"
  tagline: "Founder * Builder * Data Infrastructure * BBS Nostalgist"
  location: "California, USA"
  phone: "+1-408-555-0142"
  sysop: "Mustafa"
  baud: 14400
  nodes: 1
  theme: default

# Modem/terminal settings shown in the Terminate intro
terminal:
  software: "Terminate 5.0"
  com_port: "COM1"
  modem: "Hayes Smartmodem 14400"
  emulation: "ANSI-BBS"
  parity: "8N1"

# Header art - reference a .ans file or use inline ASCII.
# Inline color tags: {color}text{/} where color is one of:
#   black blue green cyan red magenta brown gray
#   lightblue lightgreen lightcyan lightred lightmagenta yellow white
# Untagged characters fall back to the outer header color (blue).
header:
  type: inline
  # Available: figlet, inline, file
  # If file: path to a .ans or .txt file
  # If figlet: auto-generate from site.sysop name
  art: |
    ╔══════════════════════════════════════════════════════════════════════════════╗
    ║ {gray}▄▄▄▄▄▄{/}  {lightcyan}███╗   ███╗██╗   ██╗███████╗████████╗ █████╗ ███████╗ █████╗{/}  {gray}▄▄▄▄▄▄{/} ║
    ║ {gray}██████{/}  {lightcyan}████╗ ████║██║   ██║██╔════╝╚══██╔══╝██╔══██╗██╔════╝██╔══██╗{/} {gray}██████{/} ║
    ║ {gray}▀▀▀▀▀▀{/}  {white}██╔████╔██║██║   ██║███████╗   ██║   ███████║█████╗  ███████║{/} {gray}▀▀▀▀▀▀{/} ║
    ║ {gray}██████{/}  {cyan}██║╚██╔╝██║██║   ██║╚════██║   ██║   ██╔══██║██╔══╝  ██╔══██║{/} {gray}██████{/} ║
    ║ {gray}▀▀▀▀▀▀{/}  ██║ ╚═╝ ██║╚██████╔╝███████║   ██║   ██║  ██║██║     ██║  ██║ {gray}▀▀▀▀▀▀{/} ║
